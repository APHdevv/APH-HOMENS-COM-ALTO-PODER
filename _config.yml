# Site Settings
title: "APH - Homens com Poder Absoluto"
email: "contato@aph.com.br"
description: >-
  O método que transforma homens comuns em líderes. Descubra como mais de 3.400
  homens já aplicaram o sistema APH e conquistaram respeito, autoridade e 
  liberdade financeira.

# URL Settings
url: "" # Deixe vazio para GitHub Pages
baseurl: "" # Deixe vazio para GitHub Pages

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# SASS/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Collections
collections:
  testimonials:
    output: false
  quotes:
    output: false